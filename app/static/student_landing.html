<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Rejoindre un cours - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=1.2.1">
</head>

<body>
    <div class="container" style="max-width: 480px; margin: 0 auto;">
        <header class="header" style="justify-content: center; text-align: center; flex-direction: column;">
            <h1>Rejoindre un cours</h1>
            <p style="color: var(--color-text-muted); font-size: 0.875rem;">Entrez le code de votre professeur</p>
        </header>

        <section class="card">
            <form id="join-form">
                <div class="form-group">
                    <label for="code">Code du cours</label>
                    <input type="text" id="code" required placeholder="Ex: MATH101" autofocus>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Rejoindre</button>
            </form>
        </section>

        <footer class="footer">
            <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
            <span class="version">v1.2.0</span>
        </footer>
    </div>

    <script>
        document.getElementById('join-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value.trim().toUpperCase();
            if (code) {
                window.location.href = `/?code=${code}`;
            }
        });
    </script>
</body>

</html>
