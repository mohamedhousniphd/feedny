<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Connexion Enseignant - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=1.2.1">
</head>

<body>
    <div class="container" style="max-width: 480px; margin: 0 auto;">
        <header class="header" style="justify-content: center; text-align: center; flex-direction: column;">
            <h1>Afeedny</h1>
            <p style="color: var(--color-text-muted); font-size: 0.875rem;">Accès Enseignant</p>
        </header>

        <section class="card">
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email professionnel</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary" id="login-btn" style="width: 100%; height: 44px; margin-top: 8px;">Se connecter</button>
            </form>
            <div style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--color-text-muted);">
                Pas encore de compte ? <a href="/signup" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">Créer un compte</a>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
        <span class="version">v1.2.0</span>
    </footer>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Connexion...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', email); // OAuth2PasswordRequestForm expects 'username'
            formData.append('password', password);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/teacher/dashboard';
                } else {
                    alert(data.detail || 'Email ou mot de passe incorrect');
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                }
            } catch (error) {
                alert('Erreur de connexion');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>

</html>
