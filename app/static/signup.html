<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Inscription Enseignant - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
    <div class="container" style="max-width: 480px; margin: 0 auto;">
        <header class="header" style="justify-content: center; text-align: center; flex-direction: column;">
            <h1>Afeedny</h1>
            <p style="color: var(--color-text-muted); font-size: 0.875rem;">Créer un compte enseignant</p>
        </header>

        <section class="card">
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Nom Complet</label>
                    <input type="text" id="name" required placeholder="Ex: Prof. Mohamed">
                </div>
                <div class="form-group">
                    <label for="email">Email professionnel</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="invitation_code">Code d'invitation</label>
                    <input type="text" id="invitation_code" required placeholder="Code enseignant ou admin" style="text-transform: uppercase;">
                    <p style="margin-top: 6px; color: var(--color-text-muted); font-size: 0.75rem;">Un code d'invitation est nécessaire pour l'inscription.</p>
                </div>
                <button type="submit" class="btn btn-primary" id="signup-btn" style="width: 100%; height: 44px; margin-top: 8px;">Créer mon compte</button>
            </form>
            <div style="margin-top: 24px; text-align: center; font-size: 0.875rem; color: var(--color-text-muted);">
                Déjà un compte ? <a href="/login" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">Se connecter</a>
            </div>
        </section>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Inscription...';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, invitation_code: document.getElementById('invitation_code').value.trim() })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Compte créé avec succès ! Votre code enseignant est : ' + data.unique_code);
                    window.location.href = '/teacher/dashboard';
                } else {
                    alert(data.detail || 'Erreur lors de l\'inscription');
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                }
            } catch (error) {
                alert('Erreur de connexion');
                btn.disabled = false;
                btn.textContent = 'S\'inscrire';
            }
        });
    </script>
</body>

</html>
