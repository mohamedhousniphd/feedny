<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Inscription Enseignant - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=1.2.2">
</head>

<body>
    <div class="container container-tight">
        <header class="header header-centered">
            <h1>Afeedny</h1>
            <p class="text-sm text-muted">Créer un compte enseignant</p>
        </header>

        <section class="card">
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Nom Complet</label>
                    <input type="text" id="name" required placeholder="Ex: Prof. Mohamed">
                </div>
                <div class="form-group">
                    <label for="email">Email professionnel</label>
                    <input type="email" id="email" required placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="invitation_code">Code d'invitation</label>
                    <input type="text" id="invitation_code" required placeholder="Code enseignant ou admin" class="text-uppercase">
                    <p class="mt-1 text-muted text-xs">Un code d'invitation est nécessaire pour l'inscription.</p>
                </div>
                <button type="submit" class="btn btn-primary w-full h-44 mt-2" id="signup-btn">Créer mon compte</button>
            </form>
            <div class="text-center mt-6 text-sm text-muted">
                Déjà un compte ? <a href="/login" class="btn-link">Se connecter</a>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
        <span class="version">v1.2.2</span>
    </footer>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Inscription...';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, invitation_code: document.getElementById('invitation_code').value.trim() })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Compte créé avec succès ! Votre code enseignant est : ' + data.unique_code);
                    window.location.href = '/teacher/dashboard';
                } else {
                    alert(data.detail || 'Erreur lors de l\'inscription');
                    btn.disabled = false;
                    btn.textContent = 'S\'inscrire';
                }
            } catch (error) {
                alert('Erreur de connexion');
                btn.disabled = false;
                btn.textContent = 'S\'inscrire';
            }
        });
    </script>
</body>

</html>
