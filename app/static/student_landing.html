<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Rejoindre un cours - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
    <div class="container">
        <header class="header" style="justify-content: center; text-align: center; flex-direction: column;">
            <h1>Afeedny</h1>
            <p style="color: var(--color-text-muted); font-size: 0.875rem;">Rejoindre une session de feedback</p>
        </header>

        <section style="max-width: 480px; margin: 0 auto;">
            <div class="card">
                <form id="code-form">
                    <div class="form-group">
                        <label for="code">Code Enseignant</label>
                        <input type="text" id="code" style="font-size: 1.5rem; letter-spacing: 0.2em; text-align: center; text-transform: uppercase;" required maxlength="10" placeholder="CODE">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Accéder au formulaire</button>
                </form>
            </div>
        </section>
    </div>

    <script>
        document.getElementById('code-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value.trim().toUpperCase();
            if (code) {
                window.location.href = `/?code=${code}`;
            }
        });
    </script>
</body>

</html>
