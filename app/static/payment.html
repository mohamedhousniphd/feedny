<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Acheter des Crédits - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=1.2.2">
</head>

<body>
    <div class="container container-md">
        <header class="header header-centered border-bottom-0 pb-0">
            <h1>Recharger mes crédits</h1>
        </header>

        <section class="card">
            <h2>Instructions de Paiement</h2>
            <div id="instructions-container" class="card bg-muted p-4 mt-2 text-sm">
                <p id="payment-text">Chargement des instructions...</p>
            </div>

            <div class="upload-section mt-8">
                <h3>Envoyer une preuve de paiement</h3>
                <form id="upload-form" class="mt-4">
                    <div class="form-group">
                        <label for="receipt-file">Reçu / Capture d'écran</label>
                        <input type="file" id="receipt-file" accept="image/*,.pdf" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-full h-44">Envoyer la preuve</button>
                </form>
            </div>

            <div class="mt-8 pt-6 border-top text-center">
                <a href="/teacher/dashboard" class="btn btn-secondary w-full">Retour au Dashboard</a>
            </div>
        </section>
    </div>
     <script>
            document.addEventListener('DOMContentLoaded', async () => {
                // Load instructions
                try {
                    const response = await fetch('/api/payment/instructions');
                    const data = await response.json();
                    document.getElementById('payment-text').innerHTML = data.instructions.replace(/\n/g, '<br>');
                } catch (error) {
                    console.error('Error loading instructions:', error);
                    document.getElementById('payment-text').textContent = "Erreur de chargement des instructions.";
                }

                // Handle upload
                document.getElementById('upload-form').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const fileInput = document.getElementById('receipt-file');
                    const file = fileInput.files[0];
                    if (!file) return;

                    const formData = new FormData();
                    formData.append('file', file);

                    try {
                        const btn = e.target.querySelector('button');
                        btn.disabled = true;
                        btn.textContent = 'Envoi en cours...';

                        const response = await fetch('/api/payment/upload', {
                            method: 'POST',
                            body: formData
                        });

                        const result = await response.json();
                        if (response.ok) {
                            alert('Reçu envoyé avec succès ! L\'administrateur validera votre paiement prochainement.');
                            fileInput.value = '';
                        } else {
                            alert('Erreur: ' + (result.detail || 'Erreur lors de l\'envoi'));
                        }
                    } catch (error) {
                        alert('Erreur de connexion');
                    } finally {
                        const btn = e.target.querySelector('button');
                        btn.disabled = false;
                        btn.textContent = 'Envoyer la preuve';
                    }
                });
            });
        </script>
    </div>

    <footer class="footer">
        <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
        <span class="version">v1.2.2</span>
    </footer>
</body>

</html>
