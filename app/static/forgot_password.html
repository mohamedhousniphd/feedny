<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Mot de passe oublié - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v={{version}}">
</head>

<body>
    <div class="container container-tight">
        <header class="header header-centered">
            <h1>Récupération</h1>
            <p class="text-sm text-muted">Réinitialisez votre accès</p>
        </header>

        <section class="card">
            <form id="forgot-password-form">
                <div class="form-group mb-8">
                    <label for="email" class="text-center w-full">Email professionnel</label>
                    <input type="email" id="email" class="text-center" required placeholder="votre@email.com">
                </div>
                <button type="submit" class="btn btn-primary w-auto mx-auto d-block px-12 h-44 mt-2">Envoyer le lien</button>
            </form>
            <div id="message" class="hidden mt-4 p-4 text-sm text-center"></div>

            <div class="text-center mt-6 text-sm">
                <a href="/login" class="btn-link">Retour à la connexion</a>
            </div>
        </section>

        <footer class="footer">
            <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
            <span class="version">v{{version}}</span>
        </footer>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const btn = e.target.querySelector('button');
            const msgDiv = document.getElementById('message');

            btn.disabled = true;
            btn.textContent = 'Envoi...';
            msgDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                msgDiv.textContent = data.message;
                msgDiv.classList.remove('hidden');

                if (response.ok) {
                    msgDiv.style.backgroundColor = '#d1fae5';
                    msgDiv.style.color = '#065f46';
                    e.target.reset();
                } else {
                    msgDiv.style.backgroundColor = '#fee2e2';
                    msgDiv.style.color = '#991b1b';
                }
            } catch (error) {
                msgDiv.textContent = "Erreur de connexion";
                msgDiv.classList.remove('hidden');
                msgDiv.style.backgroundColor = '#fee2e2';
                msgDiv.style.color = '#991b1b';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Envoyer le lien';
            }
        });
    </script>
</body>

</html>
