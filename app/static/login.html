<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <title>Connexion Enseignant - Afeedny</title>
    <link rel="stylesheet" href="/static/css/styles.css?v={{version}}">
</head>

<body>
    <div class="container container-tight">
        <header class="header header-centered">
            <h1>Afeedny</h1>
            <p class="text-sm text-muted">Accès Enseignant</p>
        </header>

        <section class="card">
            <form id="login-form">
                <div class="form-group mb-6">
                    <label for="email" class="text-center w-full">Email professionnel</label>
                    <input type="email" id="email" class="text-center" required placeholder="votre@email.com">
                </div>
                <div class="form-group mb-8">
                    <label for="password" class="text-center w-full">Mot de passe</label>
                    <input type="password" id="password" class="text-center" required>
                </div>
                <button type="submit" class="btn btn-primary w-auto mx-auto d-block px-12 h-48 mt-2" id="login-btn">Se connecter</button>
            </form>
            <div class="text-center mt-6 text-sm text-muted">
                Pas encore de compte ? <a href="/signup" class="btn-link">Créer un compte</a>
            </div>
        </section>
    </div>

    <footer class="footer">
        <p>Développé et maintenu par <a href="https://mohamedhousni.com/" target="_blank">Mohamed HOUSNI Ph.D.</a></p>
        <span class="version">v{{version}}</span>
    </footer>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Connexion...';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const formData = new URLSearchParams();
            formData.append('username', email); // OAuth2PasswordRequestForm expects 'username'
            formData.append('password', password);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = '/teacher/dashboard';
                } else {
                    alert(data.detail || 'Email ou mot de passe incorrect');
                    btn.disabled = false;
                    btn.textContent = 'Se connecter';
                }
            } catch (error) {
                alert('Erreur de connexion');
                btn.disabled = false;
                btn.textContent = 'Se connecter';
            }
        });
    </script>
</body>

</html>
